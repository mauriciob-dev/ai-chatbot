<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6cfc;
      --accent2: #a78bfa;
      --green: #34d399;
      --text: #e2e0f0;
      --muted: #6b6880;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -20%, rgba(124, 108, 252, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(52, 211, 153, 0.06) 0%, transparent 60%);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    /* Header */
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .header-text p {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--green);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }

    /* Body */
    .card-body {
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Input area — same style as chat input */
    .input-wrap {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 4px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 108, 252, 0.1);
    }

    #user {
      flex: 1;
      padding: 14px 16px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
    }

    #user::placeholder { color: var(--muted); }

    /* Login button */
    #btn_send {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #6c5ce7);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      text-transform: uppercase;
    }

    #btn_send:hover { opacity: 0.9; }
    #btn_send:active { transform: scale(0.98); }
    #btn_send:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Error message */
    .error {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #f87171;
      min-height: 16px;
      margin-top: 4px;
    }

    /* Footer */
    .card-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="header-icon">⚡</div>
      <div class="header-text">
        <h1>AI Chatbot</h1>
        <p>identify yourself to continue</p>
      </div>
      <div class="status">
        <div class="status-dot"></div>
        online
      </div>
    </div>

    <div class="card-body">
      <label for="user">Username</label>
      <div class="input-wrap">
        <input
          type="text"
          id="user"
          placeholder="Enter your name..."
          autocomplete="off"
          autofocus
        />
      </div>
      <div class="error" id="errorMsg"></div>
      <button id="btn_send">Enter Chat →</button>
    </div>

    <div class="card-footer">
      session secured with JWT · groq llama-3.3-70b
    </div>
  </div>

  <script>
    const btn = document.getElementById("btn_send");
    const input = document.getElementById("user");
    const errorMsg = document.getElementById("errorMsg");

    async function login() {
      const user = input.value.trim();

      // Validación
      if (!user) {
        errorMsg.textContent = "Username cannot be empty.";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Connecting...";
      errorMsg.textContent = "";

      try {
        const res = await fetch("/session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user: user })
        });

        const data = await res.json();

        if (data.token) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("username", user);
          window.location.href = "/";
        } else {
          errorMsg.textContent = "Could not create session. Try again.";
          btn.disabled = false;
          btn.textContent = "Enter Chat →";
        }
      } catch (err) {
        errorMsg.textContent = "⚠️ Error connecting to server.";
        btn.disabled = false;
        btn.textContent = "Enter Chat →";
      }
    }

    btn.addEventListener("click", login);
    input.addEventListener("keypress", e => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
