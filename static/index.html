<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6cfc;
      --accent2: #a78bfa;
      --green: #34d399;
      --text: #e2e0f0;
      --muted: #6b6880;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -20%, rgba(124, 108, 252, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(52, 211, 153, 0.06) 0%, transparent 60%);
    }

    .container {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 0;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 16px 16px 0 0;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-text p {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--green);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    /* Messages */
    #messages {
      height: 440px;
      overflow-y: auto;
      padding: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: msgIn 0.25s ease both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-items: flex-end; }
    .message.bot { align-items: flex-start; }

    .msg-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 4px;
    }

    .msg-bubble {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.user .msg-bubble {
      background: linear-gradient(135deg, var(--accent), #6c5ce7);
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .message.bot .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 3px;
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* Typing indicator */
    .typing .msg-bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: typingBounce 1.2s ease infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .empty-state .icon { font-size: 32px; opacity: 0.4; }

    /* Input area */
    .input-area {
      display: flex;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 1px solid var(--border);
      border-radius: 0 0 16px 16px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .input-area:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 108, 252, 0.1);
    }

    #userInput {
      flex: 1;
      padding: 18px 20px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
    }

    #userInput::placeholder { color: var(--muted); }

    #sendBtn {
      padding: 0 24px;
      background: linear-gradient(135deg, var(--accent), #6c5ce7);
      border: none;
      color: white;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #sendBtn:hover { opacity: 0.9; }
    #sendBtn:active { transform: scale(0.97); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    .send-icon { font-size: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">⚡</div>
      <div class="header-text">
        <h1>AI Chatbot</h1>
        <p>llama-3.3-70b-versatile · groq</p>
      </div>
      <div class="status">
        <div class="status-dot"></div>
        online
      </div>
    </div>

    <div id="messages">
      <div class="empty-state" id="emptyState">
        <div class="icon">💬</div>
        <span>Start a conversation...</span>
      </div>
    </div>

    <div class="input-area">
      <input id="userInput" type="text" placeholder="Type a message and press Enter..." autocomplete="off" />
      <button id="sendBtn" onclick="sendMessage()">
        <span class="send-icon">↑</span> Send
      </button>
    </div>
  </div>

  <script>
    if (!localStorage.getItem("token")) {
      window.location.href = "/login"
    }
    const username = localStorage.getItem("username")
    document.querySelector(".header-text p").textContent =
        `${username} · llama-3.3-70b-versatile`
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const emptyState = document.getElementById("emptyState");

    function addMessage(role, text) {
      if (emptyState) emptyState.remove();

      const wrap = document.createElement("div");
      wrap.className = `message ${role}`;

      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = role === "user" ? "you" : "assistant";

      const bubble = document.createElement("div");
      bubble.className = "msg-bubble";
      bubble.textContent = text;

      wrap.appendChild(label);
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrap;
    }

    function showTyping() {
      if (emptyState) emptyState.remove();
      const wrap = document.createElement("div");
      wrap.className = "message bot typing";
      wrap.id = "typing-indicator";

      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = "assistant";

      const bubble = document.createElement("div");
      bubble.className = "msg-bubble";
      bubble.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;

      wrap.appendChild(label);
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById("typing-indicator");
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      addMessage("user", text);
      inputEl.value = "";
      sendBtn.disabled = true;
      showTyping();

      try {
        const token = localStorage.getItem("token")
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
           },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        removeTyping();
        addMessage("bot", data.reply);
      } catch (err) {
        removeTyping();
        addMessage("bot", "⚠️ Error connecting to server.");
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    inputEl.addEventListener("keypress", e => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
